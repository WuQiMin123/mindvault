<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 420px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: #1f2937;
      background: #fff;
    }
    .container { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    h1 { font-size: 16px; font-weight: 600; }
    label { font-size: 13px; font-weight: 500; color: #374151; }
    input, textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
    }
    input:focus, textarea:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.2); }
    textarea { min-height: 120px; resize: vertical; }
    .row { display: flex; flex-direction: column; gap: 4px; }
    .tag-input { display: flex; gap: 6px; }
    .tag-input input { flex: 1; }
    .tag-input button {
      padding: 6px 12px;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }
    .tag-input button:hover { background: #2563eb; }
    .tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      background: #eff6ff;
      color: #1d4ed8;
      border-radius: 4px;
      font-size: 12px;
    }
    .tag button {
      background: none;
      border: none;
      color: #93c5fd;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 0;
    }
    .tag button:hover { color: #2563eb; }
    .available-tag {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      background: #f3f4f6;
      color: #374151;
      border: 1px dashed #d1d5db;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .available-tag:hover { background: #e5e7eb; border-color: #9ca3af; }
    .available-tag.used { opacity: 0.3; cursor: default; background: #f9fafb; }
    .available-tag.used:hover { background: #f9fafb; border-color: #d1d5db; }
    .actions { display: flex; gap: 8px; }
    .actions button {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-primary:hover { background: #2563eb; }
    .btn-primary:disabled { background: #93c5fd; cursor: not-allowed; }
    .btn-secondary { background: #f3f4f6; color: #374151; }
    .btn-secondary:hover { background: #e5e7eb; }
    .status { font-size: 12px; color: #6b7280; text-align: center; }
    .status.error { color: #ef4444; }
    .status.success { color: #16a34a; }
    .no-selection {
      text-align: center;
      padding: 40px 16px;
      color: #9ca3af;
    }
    .no-selection p { margin-top: 8px; font-size: 13px; }
  </style>
</head>
<body>
  <div id="noSelection" class="no-selection" style="display:none;">
    <div style="font-size: 32px;">⚠️</div>
    <p>请先在网页上选中内容，再使用此插件</p>
  </div>

  <div id="form" class="container" style="display:none;">
    <h1>保存到 MindVault</h1>

    <div class="row">
      <label>标题</label>
      <input id="title" type="text" placeholder="页面标题">
    </div>

    <div class="row">
      <label>内容 <span id="sourceLabel" style="font-weight:400;color:#9ca3af;font-size:12px;"></span></label>
      <textarea id="content" placeholder="选中的文本..."></textarea>
    </div>

    <div class="row">
      <label>已有标签（点击选择）</label>
      <div id="availableTags" class="tags" style="min-height:8px;"></div>
    </div>

    <div class="row">
      <label>已选标签</label>
      <div class="tag-input">
        <input id="tagInput" type="text" placeholder="输入标签后点添加" />
        <button id="addTagBtn">添加</button>
      </div>
      <div id="tags" class="tags"></div>
    </div>

    <div class="actions">
      <button id="cancelBtn" class="btn-secondary">取消</button>
      <button id="saveBtn" class="btn-primary" disabled>保存</button>
    </div>

    <div id="status" class="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
